<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="720" height="150" rx="12" fill="#fafaf9"/>

  <!-- Your machine -->
  <rect x="20" y="20" width="200" height="110" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="120" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Your machine</text>
  <text x="120" y="64" text-anchor="middle" font-size="10" fill="#3b82f6">cgr apply</text>
  <rect x="36" y="76" width="168" height="38" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="120" y="92" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">.state file lives here</text>
  <text x="120" y="106" text-anchor="middle" font-size="9" fill="#3b82f6">crash-safe, append-only</text>

  <!-- Arrow -->
  <line x1="220" y1="70" x2="280" y2="70" stroke="#6b7280" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="250" y="60" text-anchor="middle" font-size="9" font-weight="600" fill="#6b7280">SSH</text>

  <!-- Server 1 -->
  <rect x="290" y="20" width="130" height="110" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="355" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">web-1</text>
  <text x="355" y="64" text-anchor="middle" font-size="9" fill="#16a34a">deploy@10.0.1.5</text>
  <rect x="300" y="76" width="110" height="26" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="355" y="93" text-anchor="middle" font-size="9" fill="#166534">commands run here</text>
  <rect x="300" y="104" width="110" height="18" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="355" y="117" text-anchor="middle" font-size="8" fill="#166534">sudo -u root when needed</text>

  <!-- Arrow to server 2 -->
  <line x1="220" y1="85" x2="280" y2="85" stroke="#6b7280" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr3)"/>

  <!-- Server 2 -->
  <rect x="436" y="20" width="130" height="110" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="501" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">web-2</text>
  <text x="501" y="64" text-anchor="middle" font-size="9" fill="#16a34a">deploy@10.0.1.6</text>
  <rect x="446" y="76" width="110" height="26" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="501" y="93" text-anchor="middle" font-size="9" fill="#166534">commands run here</text>
  <rect x="446" y="104" width="110" height="18" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="501" y="117" text-anchor="middle" font-size="8" fill="#166534">sudo -u root when needed</text>

  <!-- Server N -->
  <rect x="582" y="20" width="126" height="110" rx="8" fill="#f5f5f5" stroke="#d4d4d4" stroke-dasharray="4"/>
  <text x="645" y="70" text-anchor="middle" font-size="22" fill="#a3a3a3">···</text>
  <text x="645" y="100" text-anchor="middle" font-size="9" fill="#a3a3a3">more targets</text>

  <line x1="220" y1="75" x2="435" y2="50" stroke="#6b7280" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr3)"/>
</svg>
