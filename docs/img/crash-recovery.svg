<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="720" height="200" rx="12" fill="#fafaf9"/>

  <!-- Run 1 -->
  <text x="20" y="24" font-size="11" font-weight="700" fill="#a3a3a3">FIRST RUN</text>
  <rect x="20"  y="38" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="65"  y="60" text-anchor="middle" font-size="11" fill="#166534">✓ step 1</text>
  <rect x="120" y="38" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="165" y="60" text-anchor="middle" font-size="11" fill="#166534">✓ step 2</text>
  <rect x="220" y="38" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="265" y="60" text-anchor="middle" font-size="11" fill="#166534">✓ step 3</text>
  <rect x="320" y="38" width="90" height="36" rx="6" fill="#fecaca" stroke="#f87171"/>
  <text x="365" y="60" text-anchor="middle" font-size="11" fill="#991b1b">✗ step 4</text>
  <rect x="420" y="38" width="90" height="36" rx="6" fill="#f5f5f5" stroke="#d4d4d4"/>
  <text x="465" y="60" text-anchor="middle" font-size="11" fill="#a3a3a3">step 5</text>
  <rect x="520" y="38" width="90" height="36" rx="6" fill="#f5f5f5" stroke="#d4d4d4"/>
  <text x="565" y="60" text-anchor="middle" font-size="11" fill="#a3a3a3">step 6</text>

  <!-- State file indicator -->
  <rect x="624" y="34" width="82" height="44" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="665" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">.state file</text>
  <text x="665" y="68" text-anchor="middle" font-size="9" fill="#c2410c">1✓ 2✓ 3✓ 4✗</text>

  <!-- Arrow between runs -->
  <text x="340" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">fix the problem, then run again ↓</text>

  <!-- Run 2 -->
  <text x="20" y="130" font-size="11" font-weight="700" fill="#a3a3a3">RESUME</text>
  <rect x="20"  y="144" width="90" height="36" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="65"  y="166" text-anchor="middle" font-size="11" fill="#3730a3">⏭ skip</text>
  <rect x="120" y="144" width="90" height="36" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="165" y="166" text-anchor="middle" font-size="11" fill="#3730a3">⏭ skip</text>
  <rect x="220" y="144" width="90" height="36" rx="6" fill="#e0e7ff" stroke="#a5b4fc"/>
  <text x="265" y="166" text-anchor="middle" font-size="11" fill="#3730a3">⏭ skip</text>
  <rect x="320" y="144" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="365" y="166" text-anchor="middle" font-size="11" fill="#166534">✓ retry</text>
  <rect x="420" y="144" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="465" y="166" text-anchor="middle" font-size="11" fill="#166534">✓ run</text>
  <rect x="520" y="144" width="90" height="36" rx="6" fill="#dcfce7" stroke="#86efac"/>
  <text x="565" y="166" text-anchor="middle" font-size="11" fill="#166534">✓ run</text>

  <rect x="624" y="140" width="82" height="44" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="665" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">instant</text>
  <text x="665" y="174" text-anchor="middle" font-size="9" fill="#16a34a">no re-checking</text>
</svg>
