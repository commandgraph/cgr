# Fleet inventory — hosts to audit
#
# Format: Ansible-style INI
#   [group_name]
#   hostname  host=ADDRESS  user=USER  port=PORT
#
#   [group_name:vars]
#   key = value
#
# Usage:
#   cgr apply audit.cgr --repo ./repo -i fleet.ini
#   cgr apply audit.cgr --repo ./repo                  (if graph has: inventory "fleet.ini")

[fleet]
pi       host=192.168.1.8   user=pi
nas      host=192.168.1.9   user=pi
desktop  host=192.168.1.10  user=coder

[fleet:vars]
dns_test = google.com
http_test = https://google.com
