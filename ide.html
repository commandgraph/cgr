// ── Report tab ─────────────────────────────────────────
async function loadReport() {
  reportEl.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const r = await api('GET', '/api/report');
    const outputs = r.outputs || [];
    if (!outputs.length) {
      reportEl.innerHTML = '<div class="empty">No collected outputs yet.<br><span style="font-size:10px;color:var(--text3)">Add <code>collect "key"</code> to steps and run apply.</span></div>';
      return;
    }
    let html = '<div style="margin-bottom:8px;display:flex;gap:6px;align-items:center">';
    html += '<span style="font-size:11px;font-weight:600;color:var(--accent);font-family:var(--mono)">Collected Outputs</span>';
    html += '<span style="color:var(--text3);font-size:10px">(' + outputs.length + ')</span>';
    html += '<span style="flex:1"></span>';
    html += '<button class="btn" style="font-size:10px;padding:2px 6px" onclick="exportReport(\'json\')">JSON</button>';
    html += '<button class="btn" style="font-size:10px;padding:2px 6px" onclick="exportReport(\'csv\')">CSV</button>';
    html += '</div>';
    for (const o of outputs) {
      const status = (o.rc === 0 || o.rc === null) ? '<span style="color:var(--green)">ok</span>' : '<span style="color:var(--red)">exit=' + o.rc + '</span>';
      html += '<div style="margin-bottom:10px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">';
      html += '<div style="padding:4px 8px;background:var(--bg3);display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono)">';
      html += '<span style="color:var(--accent);font-weight:600">' + esc(o.key) + '</span>';
      html += '<span style="color:var(--text3)">on</span>';
      html += '<span style="font-weight:600">' + esc(o.node) + '</span>';
      html += '<span style="flex:1"></span>';
      html += status;
      html += '<span style="color:var(--text3);font-size:10px">' + (o.ms||0) + 'ms</span>';
      html += '</div>';
      const stdout = (o.stdout || '').trim();
      if (stdout) {
        html += '<pre style="padding:6px 8px;font-size:10px;font-family:var(--mono);color:var(--text2);white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;margin:0">' + esc(stdout) + '</pre>';
      }
      html += '</div>';
    }
    reportEl.innerHTML = html;
  } catch (e) {
    reportEl.innerHTML = '<div class="empty" style="color:var(--red)">' + esc(String(e)) + '</div>';
  }
}

async function exportReport(fmt) {
  try {
    const r = await api('GET', '/api/report');
    const outputs = r.outputs || [];
    let text, mimeType, ext;
    if (fmt === 'json') {
      text = JSON.stringify(outputs, null, 2);
      mimeType = 'application/json'; ext = 'json';
    } else {
      // CSV
      const keys = [...new Set(outputs.map(o => o.key))].sort();
      const nodes = [...new Set(outputs.map(o => o.node))].sort();
      let lines = [];
      if (nodes.length > 1) {
        lines.push(['node', ...keys].join(','));
        const byNode = {};
        for (const o of outputs) {
          if (!byNode[o.node]) byNode[o.node] = {};
          byNode[o.node][o.key] = (o.stdout||'').trim().replace(/"/g,'""');
        }
        for (const n of nodes) {
          lines.push([n, ...keys.map(k => '"' + (byNode[n]?.[k]||'') + '"')].join(','));
        }
      } else {
        lines.push('key,node,value,status,ms');
        for (const o of outputs) {
          const s = (o.rc===0||o.rc===null) ? 'ok' : 'exit='+o.rc;
          lines.push([o.key, o.node, '"'+(o.stdout||'').trim().replace(/"/g,'""')+'"', s, o.ms||0].join(','));
        }
      }
      text = lines.join('\n') + '\n';
      mimeType = 'text/csv'; ext = 'csv';
    }
    const blob = new Blob([text], {type: mimeType});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'report.' + ext;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    alert('Export failed: ' + e);
  }
}

// ── File viewer (tabbed in graph area) ─────────────────
let currentExternalFiles = [];
let sideFilePath = null;    // resolved path of the open file
let sideFileType = null;    // 'template' | 'inventory' | 'secrets'
let sideEditing = false;    // true when user has enabled editing
let sideOrigContent = '';   // original content for dirty detection
const fvCodeEl = document.getElementById('fvCode');
const fvHlEl = document.getElementById('fvHighlight');
const fvLineNumsEl = document.getElementById('fvLineNumbers');

function switchGraphTab(tab) {
  document.querySelectorAll('.graph-tabs .gtab').forEach(t => t.classList.toggle('active', t.dataset.gtab === tab));
  document.getElementById('graphPanel').style.display = tab === 'graph' ? '' : 'none';
  document.getElementById('fileviewPanel').style.display = tab === 'fileview' ? '' : 'none';
}

function renderFilesTab(files) {
  currentExternalFiles = files;
  const el = document.getElementById('filesContent');
  if (!files.length) { el.innerHTML = '<div class="empty">No external files</div>'; return; }
  const icons = { template: '📦', inventory: '📋', secrets: '🔒' };
  const colors = { template: 'var(--accent)', inventory: 'var(--green)', secrets: 'var(--amber)' };
  let h = '<div style="padding:12px">';
  const byType = {};
  files.forEach(f => { (byType[f.type] = byType[f.type] || []).push(f); });
  for (const [type, group] of Object.entries(byType)) {
    h += '<div class="ds"><h3>' + esc(icons[type] || '📄') + ' ' + esc(type) + 's (' + group.length + ')</h3>';
    for (const f of group) {
      if (f.exists) {
        const isOpen = sideFilePath === f.resolved;
        h += '<div style="cursor:pointer;padding:4px 8px;margin:2px 0;border-radius:var(--radius);border:1px solid '
          + (isOpen ? colors[type] : 'var(--border)') + ';background:' + (isOpen ? 'var(--bg-hover)' : 'var(--bg3)')
          + ';display:flex;align-items:center;gap:6px;transition:all .15s"'
          + ' data-action="open-side-editor" data-resolved="' + esc(f.resolved) + '" data-type="' + esc(f.type) + '" data-path="' + esc(f.path) + '"'
          + ' onmouseover="this.style.borderColor=\'' + colors[type] + '\'" onmouseout="if(' + !isOpen + ')this.style.borderColor=\'var(--border)\'">'
          + '<span style="font-family:var(--mono);font-size:11px;color:' + colors[type] + '">' + esc(f.path) + '</span>'
          + (isOpen ? '<span style="font-size:9px;color:var(--text3);margin-left:auto">open</span>'
                    : '<span style="font-size:9px;color:var(--text3);margin-left:auto">click to open</span>')
          + '</div>';
      } else {
        h += '<div style="padding:4px 8px;margin:2px 0;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);opacity:.5;display:flex;align-items:center;gap:6px">'
          + '<span style="font-family:var(--mono);font-size:11px;color:var(--red)">' + esc(f.path) + '</span>'
          + '<span style="font-size:9px;color:var(--red);margin-left:auto">not found</span>'
          + '</div>';
      }
    }
    if (type === 'template') {
      h += '<div style="font-size:10px;color:var(--text3);margin-top:4px;font-style:italic">Loaded from repo directory</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

function updateFvHighlight() {
  fvHlEl.innerHTML = highlightSyntax(fvCodeEl.value) + '\n';
  const lines = fvCodeEl.value.split('\n').length;
  let lnHtml = '';
  for (let i = 1; i <= lines; i++) lnHtml += '<div>' + i + '</div>';
  fvLineNumsEl.innerHTML = lnHtml;
  // Sync textarea height
  requestAnimationFrame(() => { fvCodeEl.style.height = fvHlEl.offsetHeight + 'px'; });
}

// Keep file viewer highlight in sync when editing
fvCodeEl.addEventListener('input', updateFvHighlight);
fvCodeEl.addEventListener('scroll', () => {
  fvHlEl.scrollTop = fvCodeEl.scrollTop;
  fvHlEl.scrollLeft = fvCodeEl.scrollLeft;
});

async function openSideEditor(resolvedPath, type, displayPath, scrollToStep) {
  const icons = { template: '📦', inventory: '📋', secrets: '🔒' };
  const badgeColors = { template: 'background:rgba(88,166,255,.15);color:var(--accent)',
    inventory: 'background:rgba(63,185,80,.15);color:var(--green)',
    secrets: 'background:rgba(210,153,34,.15);color:var(--amber)' };

  sideFilePath = resolvedPath;
  sideFileType = type;
  sideEditing = false;

  // Update tab
  const tabFile = document.getElementById('gtabFile');
  document.getElementById('gtabFileIcon').textContent = icons[type] || '📄';
  document.getElementById('gtabFileLabel').textContent = displayPath || resolvedPath.split('/').slice(-2).join('/');
  tabFile.style.display = '';
  switchGraphTab('fileview');

  // Update header
  document.getElementById('fvLock').textContent = '🔒';
  document.getElementById('fvLock').title = 'Read-only';
  document.getElementById('fvLock').style.color = '';
  document.getElementById('fvPath').textContent = resolvedPath;
  document.getElementById('fvPath').title = resolvedPath;
  const badge = document.getElementById('fvBadge');
  badge.textContent = type;
  badge.style.cssText = badgeColors[type] || '';
  document.getElementById('fvMsg').textContent = 'Read-only';
  document.getElementById('fvMsg').style.color = '';
  const editBtn = document.getElementById('fvEditBtn');
  editBtn.textContent = 'Enable editing';
  editBtn.onclick = toggleSideEdit;
  editBtn.className = 'btn';
  editBtn.style.display = '';
  // Remove any leftover cancel/save buttons
  const oldCancel = document.getElementById('fvCancelBtn');
  if (oldCancel) oldCancel.remove();
  const oldSave = document.getElementById('fvSaveBtn');
  if (oldSave) oldSave.remove();

  // Set textarea to loading, readonly
  fvCodeEl.value = 'Loading...';
  fvCodeEl.readOnly = true;
  updateFvHighlight();

  // Re-render files tab to highlight open file
  if (currentExternalFiles.length) renderFilesTab(currentExternalFiles);

  try {
    const r = await api('GET', '/api/file/view?path=' + encodeURIComponent(resolvedPath));
    if (r.error) {
      fvCodeEl.value = 'Error: ' + r.error;
      updateFvHighlight();
      editBtn.style.display = 'none';
    } else {
      sideOrigContent = r.content;
      fvCodeEl.value = r.content;
      updateFvHighlight();
      // Scroll to a specific step if requested
      if (scrollToStep) {
        requestAnimationFrame(() => scrollFvToStep(scrollToStep));
      }
    }
  } catch (e) {
    fvCodeEl.value = 'Failed to load: ' + e;
    updateFvHighlight();
    editBtn.style.display = 'none';
  }
}

function scrollFvToStep(stepName) {
  const lines = fvCodeEl.value.split('\n');
  const lineHeight = 20.8; // 13px * 1.6 line-height
  // Search for [step_name]: pattern or closest match
  let targetLine = -1;
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    // Match [step name]: exactly
    if (trimmed.startsWith('[' + stepName + ']')) { targetLine = i; break; }
    // Match partial — step name contained in bracket
    if (trimmed.startsWith('[') && trimmed.includes(stepName)) { targetLine = i; break; }
    // Match "run $" or "check $" lines containing the step context
    if (trimmed.includes(stepName)) { if (targetLine < 0) targetLine = i; }
  }
  if (targetLine >= 0) {
    const scrollContainer = document.getElementById('fvBody');
    const scrollPos = targetLine * lineHeight - scrollContainer.clientHeight / 3;
    scrollContainer.scrollTop = Math.max(0, scrollPos);
    // Highlight the line in the line numbers
    const lnDivs = fvLineNumsEl.children;
    if (lnDivs[targetLine]) {
      lnDivs[targetLine].style.background = 'rgba(88,166,255,.2)';
      lnDivs[targetLine].style.fontWeight = '700';
      lnDivs[targetLine].style.color = 'var(--accent)';
    }
  }
}

function closeSideEditor() {
  if (sideEditing && fvCodeEl.value !== sideOrigContent) {
    if (!confirm('Discard unsaved changes to this file?')) return;
  }
  document.getElementById('gtabFile').style.display = 'none';
  document.getElementById('fileviewPanel').style.display = 'none';
  switchGraphTab('graph');
  sideFilePath = null;
  sideFileType = null;
  sideEditing = false;
  if (currentExternalFiles.length) renderFilesTab(currentExternalFiles);
}

function toggleSideEdit() {
  if (!sideEditing) {
    if (!confirm('This is a shared file. Changes will affect all graphs that import it.\n\nEnable editing?')) return;
    sideEditing = true;
    fvCodeEl.readOnly = false;
    fvCodeEl.focus();
    document.getElementById('fvLock').textContent = '✎';
    document.getElementById('fvLock').title = 'Editing';
    document.getElementById('fvLock').style.color = 'var(--amber)';
    document.getElementById('fvMsg').textContent = 'Editing — changes affect all graphs';
    document.getElementById('fvMsg').style.color = 'var(--amber)';
    // Replace edit button with save + cancel
    const editBtn = document.getElementById('fvEditBtn');
    editBtn.textContent = 'Save';
    editBtn.className = 'btn btn-green';
    editBtn.onclick = saveSideEditor;
    // Add cancel
    const cancel = document.createElement('button');
    cancel.className = 'btn';
    cancel.textContent = 'Cancel';
    cancel.id = 'fvCancelBtn';
    cancel.onclick = cancelSideEdit;
    editBtn.parentElement.appendChild(cancel);
  }
}

async function saveSideEditor() {
  const msg = document.getElementById('fvMsg');
  const text = fvCodeEl.value;
  try {
    const result = await api('POST', '/api/file/save', { path: sideFilePath, content: text });
    if (result.error) {
      msg.textContent = 'Save failed: ' + result.error;
      msg.style.color = 'var(--red)';
    } else {
      sideOrigContent = text;
      msg.textContent = 'Saved';
      msg.style.color = 'var(--green)';
      setTimeout(() => resetSideToReadOnly(), 1500);
      triggerResolve();
    }
  } catch (e) {
    msg.textContent = 'Save failed: ' + e;
    msg.style.color = 'var(--red)';
  }
}

function cancelSideEdit() {
  if (fvCodeEl.value !== sideOrigContent) {
    if (!confirm('Discard changes?')) return;
  }
  fvCodeEl.value = sideOrigContent;
  updateFvHighlight();
  resetSideToReadOnly();
}

function resetSideToReadOnly() {
  sideEditing = false;
  fvCodeEl.readOnly = true;
  document.getElementById('fvLock').textContent = '🔒';
  document.getElementById('fvLock').title = 'Read-only';
  document.getElementById('fvLock').style.color = '';
  document.getElementById('fvMsg').textContent = 'Read-only';
  document.getElementById('fvMsg').style.color = '';
  const editBtn = document.getElementById('fvEditBtn');
  editBtn.textContent = 'Enable editing';
  editBtn.className = 'btn';
  editBtn.onclick = toggleSideEdit;
  const cancel = document.getElementById('fvCancelBtn');
  if (cancel) cancel.remove();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  // Escape: close side panels
  if (e.key === 'Escape') {
    if (sideFilePath) { closeSideEditor(); return; }
  }
  // Ctrl+Enter: Apply (or Stop if running)
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
    e.preventDefault(); doApply(); return;
  }
  // Ctrl+Shift+Enter: Re-run All
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
    e.preventDefault(); doApplyFresh(); return;
  }
  // Ctrl+Shift+P: Plan (switch to exec tab + show plan)
  if ((e.key === 'p' || e.key === 'P') && (e.ctrlKey || e.metaKey) && e.shiftKey) {
    e.preventDefault(); switchInspTab('exec'); return;
  }
});

function switchInspTab(tab) {
  document.querySelectorAll('.insp-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

// ── Execution history ─────────────────────────────────
async function loadHistory() {
  try {
    const r = await api('GET', '/api/history');
    if (!r.runs || !r.runs.length) return;
    const badge = document.getElementById('historyBadge');
    badge.textContent = r.runs.length;
    badge.style.display = '';
    // Add history dropdown to exec content if not already present
    let hdr = document.getElementById('historyDropdown');
    if (!hdr) {
      hdr = document.createElement('div');
      hdr.id = 'historyDropdown';
      hdr.style.cssText = 'padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px;display:flex;align-items:center;gap:6px';
      hdr.innerHTML = '<span style="color:var(--text3)">History:</span><select id="historySel" style="flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:2px 4px;font-size:11px;font-family:var(--mono)" onchange="showHistoryRun(this.value)"><option value="">— current run —</option></select>';
      execEl.insertBefore(hdr, execEl.firstChild);
    }
    const sel = document.getElementById('historySel');
    const oldVal = sel.value;
    sel.innerHTML = '<option value="">— current run —</option>';
    r.runs.forEach((run, i) => {
      const total = run.ok + run.fail + run.skip + run.timeout;
      const icon = run.fail || run.timeout ? '✗' : '✓';
      const ts = run.ts ? run.ts.replace('T', ' ').substring(0, 19) : '?';
      sel.innerHTML += `<option value="${i}">${icon} ${ts} — ${total} steps (${run.ok}✓ ${run.fail}✗ ${run.skip}↷)</option>`;
    });
    sel.value = oldVal;
    window._historyRuns = r.runs;
  } catch(e) {}
}

function showHistoryRun(idx) {
  if (idx === '' || !window._historyRuns) return;
  const run = window._historyRuns[parseInt(idx)];
  if (!run) return;
  let log = document.getElementById('execLog');
  if (!log) {
    execEl.innerHTML += '<div class="exec-log" id="execLog"></div>';
    log = document.getElementById('execLog');
  }
  let h = `<div class="ev-wave" style="margin-bottom:4px">Run: ${esc(run.ts || '?')}</div>`;
  run.entries.forEach(e => {
    const cls = e.status === 'success' ? 'ev-ok' : e.status === 'failed' ? 'ev-fail' : e.status === 'timeout' ? 'ev-fail' : 'ev-skip';
    const icon = e.status === 'success' ? '✓' : e.status === 'failed' ? '✗' : e.status === 'timeout' ? '⏱' : '↷';
    h += `<div class="ev ${cls}"><span class="ev-icon">${icon}</span><span class="ev-name">${esc(e.id)}</span><span class="ev-time">${e.ms}ms</span></div>`;
  });
  const total = run.ok + run.fail + run.skip + run.timeout;
  const hasFail = run.fail > 0 || run.timeout > 0;
  h += `<div class="ev-done ${hasFail ? 'fail' : 'ok'}">${hasFail ? '✗ FAILED' : '✓ COMPLETE'} (${total} steps)</div>`;
  log.innerHTML = h;
}

// ── Log pane controls ──────────────────────────────────
const logPane = document.getElementById('logPane');
const logResizeH = document.getElementById('logResizeH');
const logBody = document.getElementById('logBody');
const logTitle = document.getElementById('logTitle');
const logCollapseBtn = document.getElementById('logCollapseBtn');
let logAllExpanded = true;

function showLogPane(expanded) {
  // Make log visible (may be display:none on first use)
  logPane.style.display = '';
  logResizeH.style.display = '';
  if (expanded) {
    logPane.classList.remove('collapsed');
    // Restore default height if no inline override, or keep current if resized
    if (!logPane.style.height || logPane.classList.contains('collapsed')) {
      logPane.style.height = '';  // let CSS default take over
    }
    logCollapseBtn.innerHTML = '&#9660;';
    logCollapseBtn.title = 'Collapse log';
  } else {
    logPane.classList.add('collapsed');
    logPane.style.height = '';  // CRITICAL: clear inline height from resize drag
    logResizeH.style.display = 'none';
    logCollapseBtn.innerHTML = '&#9650;';
    logCollapseBtn.title = 'Expand log';
  }
}

function toggleLogCollapse() {
  if (logPane.style.display === 'none') {
    showLogPane(true); return;
  }
  const isCollapsed = logPane.classList.contains('collapsed');
  showLogPane(isCollapsed);
}

function clearLog() { logBody.innerHTML = ''; logTitle.textContent = 'Execution log'; }

function toggleLogExpand() {
  logAllExpanded = !logAllExpanded;
  document.getElementById('logExpandBtn').innerHTML = logAllExpanded ? '&#8863; Collapse All' : '&#8862; Expand All';
  logBody.querySelectorAll('.log-detail').forEach(d => d.classList.toggle('open', logAllExpanded));
}

// Scroll log to a specific resource entry and flash it
function scrollLogToResource(rid) {
  // Always open the log pane first — even if no entry exists yet
  showLogPane(true);
  const entry = logBody.querySelector(`.log-entry[data-id="${rid}"]`);
  if (!entry) {
    // No log entry yet — log is now visible but nothing to scroll to
    return;
  }
  // Expand this entry's detail
  const detail = entry.querySelector('.log-detail');
  if (detail) detail.classList.add('open');
  // Scroll into view
  entry.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // Flash highlight
  entry.classList.remove('flash');
  void entry.offsetWidth; // force reflow
  entry.classList.add('flash');
}

// Log resize drag
logResizeH.addEventListener('mousedown', e => {
  e.preventDefault();
  const area = document.querySelector('.graph-log-area');
  const startY = e.clientY;
  const startH = logPane.offsetHeight;
  function onMove(ev) { const dy = startY - ev.clientY; logPane.style.height = Math.max(80, startH + dy) + 'px'; }
  function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

function addLogWave(wave, count) {
  logBody.innerHTML += `<div class="log-wave-hdr">── Wave ${wave} (${count}) ──</div>`;
  logBody.scrollTop = logBody.scrollHeight;
}

    startedAt: ev.ts || new Date().toISOString(),
    timeoutS: ev.timeout_s || 0,

    pid: null,
    procAlive: null,
    returnCode: null,
    lastOutputAt: null,

  startRunningStepTicker();
  const entry = document.createElement('div');
  entry.className = 'log-entry running';

  entry.innerHTML = `

      <span class="log-icon">&#9655;</span>

      <span class="log-time" style="color:var(--amber)" data-running-elapsed="${esc(ev.id)}">running...</span>

    <div class="log-detail open">
      <div class="log-detail-section">
        <span class="log-detail-label">Status</span>

      <div class="log-detail-section" data-stream="stdout" style="display:none">
        <span class="log-detail-label">stdout</span>
        <div class="log-detail-cmd cmd-stdout"></div>
      </div>
      <div class="log-detail-section" data-stream="stderr" style="display:none">
        <span class="log-detail-label">stderr</span>
        <div class="log-detail-cmd cmd-stderr"></div>
      </div>
    </div>`;
  logBody.appendChild(entry);
  logBody.scrollTop = logBody.scrollHeight;
  updateRunningMetaDisplay(ev.id);
}

function appendRunningLogOutput(rid, stream, chunk) {
  const entry = logBody.querySelector(`.log-entry.running[data-id="${rid}"]`);
  if (!entry) return;
  const meta = runningStepMeta.get(rid);
  if (meta) {
    meta.lastOutputAt = new Date().toISOString();
    meta.interactive = false;
    updateRunningMetaDisplay(rid);
    refreshExecInputAvailability();
  }
  const section = entry.querySelector(`.log-detail-section[data-stream="${stream}"]`);
  const box = section ? section.querySelector('.log-detail-cmd') : null;
  if (!section || !box) return;
  section.style.display = '';
  appendTerminalChunk(box, chunk);
  box.scrollTop = box.scrollHeight;
  if (document.getElementById('logFollowCb').checked) logBody.scrollTop = logBody.scrollHeight;
}

function addLogEntry(ev) {
  const isSkip = ev.status === 'skip' || ev.status === 'skip_check' || ev.status === 'skip_when';
  const isCancelled = ev.status === 'cancelled';
  const isFail = ev.status === 'failed' || ev.status === 'timeout';
  const isWarn = ev.status === 'warned';
  const iconCls = isFail ? 'fail' : isCancelled ? 'warn' : isWarn ? 'warn' : isSkip ? 'skip' : 'ok';
  const icon = isFail ? '✗' : isCancelled ? '■' : isWarn ? '⚠' : isSkip ? '↷' : '✓';
  const rcCls = isFail ? 'rc-fail' : 'rc-ok';
  const rcText = ev.rc !== undefined && ev.rc !== null ? `exit=${ev.rc}` : '';

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.dataset.id = ev.id;

  // Header row — click toggles detail AND highlights graph card
  let hdrHTML = `<div class="log-entry-hdr" data-action="toggle-log-detail" data-rid="${esc(ev.id)}">`;
  hdrHTML += `<span class="log-icon ${iconCls}">${icon}</span>`;
  hdrHTML += `<span class="log-name">[${ev.idx}/${ev.total}] ${esc(ev.name)}</span>`;
  if (ev.desc) hdrHTML += `<span class="log-desc">${esc(ev.desc)}</span>`;
  if (rcText && (isFail || isWarn)) hdrHTML += `<span class="log-rc ${rcCls}">${rcText}</span>`;
  hdrHTML += `<span class="log-time">${ev.ms}ms</span>`;
  if (isFail || isCancelled) hdrHTML += `<span class="ev-rerun" data-action="rerun-step" data-step="${esc(ev.name)}">rerun</span>`;
  hdrHTML += `</div>`;

  // Detail section (expandable)
  let detHTML = `<div class="log-detail${logAllExpanded || isFail || isCancelled ? ' open' : ''}">`;
  if (ev.reason) detHTML += `<div class="log-detail-section"><span class="log-detail-label">Reason</span><div class="log-detail-cmd">${esc(ev.reason)}</div></div>`;
  if (ev.check) detHTML += `<div class="log-detail-section"><span class="log-detail-label">Check</span><div class="log-detail-cmd">$ ${esc(ev.check)}</div></div>`;
  if (ev.run) detHTML += `<div class="log-detail-section"><span class="log-detail-label">Run${ev.run_as ? ' (as ' + esc(ev.run_as) + ')' : ''}</span><div class="log-detail-cmd">$ ${esc(ev.run)}</div></div>`;
  if (ev.stdout) detHTML += `<div class="log-detail-section"><span class="log-detail-label">stdout</span><div class="log-detail-cmd cmd-stdout">${ansiToHtml(ev.stdout)}</div></div>`;
  if (ev.stderr) detHTML += `<div class="log-detail-section"><span class="log-detail-label">stderr</span><div class="log-detail-cmd cmd-stderr">${ansiToHtml(ev.stderr)}</div></div>`;
  if (ev.attempts && ev.attempts > 1) detHTML += `<div class="log-detail-section"><span class="log-detail-label">Attempts</span><div class="log-detail-cmd">${ev.attempts} attempts</div></div>`;
  detHTML += `</div>`;

  entry.innerHTML = hdrHTML + detHTML;
  logBody.appendChild(entry);
  logBody.scrollTop = logBody.scrollHeight;
}

function replaceRunningLogEntry(ev) {
  const existing = logBody.querySelector(`.log-entry.running[data-id="${ev.id}"]`);
  if (!existing) {
    addLogEntry(ev);
    return;
  }
  const temp = document.createElement('div');
  temp.innerHTML = '';
  const oldScroll = logBody.scrollTop;
  addLogEntry(ev);
  const inserted = logBody.lastElementChild;
  existing.replaceWith(inserted);
  if (document.getElementById('logFollowCb').checked) logBody.scrollTop = logBody.scrollHeight;
  else logBody.scrollTop = oldScroll;
}

function ensureExecShell() {
  if (!document.getElementById('execLog')) {
    execEl.innerHTML = `
      <div class="exec-log" id="execLog"></div>
      <div class="exec-input" id="execInputWrap">
        <span class="exec-input-label" id="execInputLabel">Input</span>
        <input class="exec-input-box" id="execInputEl" type="password" placeholder="Send input to the running command and press Enter" autocomplete="off" spellcheck="false">
        <button class="btn exec-input-toggle" id="execInputToggleBtn" onclick="toggleExecInputMode()">Show</button>
        <button class="btn exec-input-send" id="execInputSendBtn" onclick="sendExecInput()">Send</button>
      </div>`;
  }
  execInputWrap = document.getElementById('execInputWrap');
  execInputEl = document.getElementById('execInputEl');
  execInputToggleBtn = document.getElementById('execInputToggleBtn');
  if (execInputEl && !execInputEl.dataset.bound) {
    execInputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendExecInput();
      }
    });
    execInputEl.dataset.bound = '1';
  }
}

function updateExecInputTarget() {
  ensureExecShell();
  const label = document.getElementById('execInputLabel');
  if (!label || !execInputEl) return;
  const targetRid = (selId && document.querySelector(`.ev-block.ev-running[data-rid="${CSS.escape(selId)}"]`))
    ? selId
    : execInputTargetRid;
  const targetName = (targetRid === selId && selId && byId[selId])
    ? byId[selId].short_name
    : execInputTargetName;
  if (targetRid && targetName) {
    label.textContent = `Input → ${targetName}`;
    execInputEl.placeholder = `Send input to ${targetName} and press Enter`;
  } else {
    label.textContent = 'Input';
    execInputEl.placeholder = 'Select a running step, then send input';
  }
}

function toggleExecInputMode() {
  ensureExecShell();
  if (!execInputEl || !execInputToggleBtn) return;
  const show = execInputEl.type === 'password';
  execInputEl.type = show ? 'text' : 'password';
  execInputToggleBtn.textContent = show ? 'Hide' : 'Show';
  execInputEl.focus();
}

function setExecInputVisible(show) {
  ensureExecShell();
  if (!execInputWrap) return;
  execInputWrap.classList.toggle('show', !!show);
  if (execInputEl) {
    if (!show) execInputEl.value = '';
    execInputEl.type = 'password';
  }
  if (execInputToggleBtn) execInputToggleBtn.textContent = 'Show';
  if (!show) {
    execInputTargetRid = null;
    execInputTargetName = null;
  }
  updateExecInputTarget();
}

async function sendExecInput() {
  ensureExecShell();
  if (!execInputEl) return;
  const value = execInputEl.value;
  if (!value) return;
  const targetRid = (selId && document.querySelector(`.ev-block.ev-running[data-rid="${CSS.escape(selId)}"]`))
    ? selId
    : execInputTargetRid;
  const r = await api('POST', '/api/apply/input', { text: value + '\n', target_step: targetRid || undefined });
  if (r && r.error) {
    setStatus('err', r.error);
    return;
  }
  execInputEl.value = '';
  execInputEl.focus();
}

function ensureExecLog() {
  let log = document.getElementById('execLog');
  if (!log) {
    execEl.innerHTML = '<div class="exec-log" id="execLog"></div>';
    log = document.getElementById('execLog');
  }
  return log;
}

function addExecRunningEntry(ev) {
  const log = ensureExecLog();
  const block = document.createElement('div');
  block.className = 'ev-block ev-running';
  block.dataset.rid = ev.id;
  block.innerHTML = `
    <div class="ev">
      <span class="ev-icon" style="animation:demo-pulse .8s infinite">&#9655;</span>
      <span class="ev-name">${esc(ev.name)}</span>
      <span class="ev-time" style="color:var(--amber)" data-running-elapsed="${esc(ev.id)}">running...</span>
    </div>
    <div class="ev-meta" data-running-meta="${esc(ev.id)}">starting...</div>
    ${ev.check ? `<pre class="ev-cmd">$ ${esc(ev.check)}</pre>` : ''}
    ${ev.run ? `<pre class="ev-cmd">$ ${esc(ev.run)}</pre>` : ''}
    <pre class="ev-stream stdout"></pre>
    <pre class="ev-stream stderr"></pre>`;
  log.appendChild(block);
  execInputTargetRid = ev.id;
  execInputTargetName = ev.name;
  updateExecInputTarget();
  updateRunningMetaDisplay(ev.id);
}

function appendExecOutput(rid, stream, chunk) {
  const log = document.getElementById('execLog');
  if (!log) return;
  const block = log.querySelector(`.ev-block.ev-running[data-rid="${rid}"]`);
  if (!block) return;
  const meta = runningStepMeta.get(rid);
  if (meta) {
    meta.lastOutputAt = new Date().toISOString();
    meta.interactive = false;
    updateRunningMetaDisplay(rid);
    refreshExecInputAvailability();
  }
  const box = block.querySelector(`.ev-stream.${stream}`);
  if (!box) return;
  execInputTargetRid = rid;
  execInputTargetName = (byId[rid] && byId[rid].short_name) || execInputTargetName || rid;
  updateExecInputTarget();
  appendTerminalChunk(box, chunk);
  box.scrollTop = box.scrollHeight;
}

function finishExecEntry(ev) {
  const log = ensureExecLog();
  const existing = log.querySelector(`.ev-block[data-rid="${ev.id}"]`);
  const isSkip = ev.status === 'skip' || ev.status === 'skip_check' || ev.status === 'skip_when';
  const isCancelled = ev.status === 'cancelled';
  const isFail = ev.status === 'failed' || ev.status === 'timeout';
  const cls = ev.status === 'success' ? 'ev-ok' : isSkip ? 'ev-skip' : isFail ? 'ev-fail' : 'ev-warn';
  const icon = ev.status === 'success' ? '✓' : isSkip ? '↷' : isFail ? '✗' : isCancelled ? '■' : '⚠';
  let rerun = (isFail || isCancelled) ? `<span class="ev-rerun" data-action="rerun-step" data-step="${esc(ev.name)}">rerun</span>` : '';
  const block = document.createElement('div');
  block.className = `ev-block ${cls}`;
  block.dataset.rid = ev.id;
  block.innerHTML = `
    <div class="ev ${cls}">
      <span class="ev-icon">${icon}</span>
      <span class="ev-name">[${ev.idx}/${ev.total}] ${esc(ev.name)}${rerun}</span>
      <span class="ev-time">${ev.ms}ms</span>
    </div>
    <pre class="ev-stream stdout">${ansiToHtml(ev.stdout || '')}</pre>
    <pre class="ev-stream stderr">${ansiToHtml(ev.stderr || '')}</pre>`;
  if (existing) existing.replaceWith(block);
  else log.appendChild(block);
  runningStepMeta.delete(ev.id);
  if (runningStepMeta.size === 0) stopRunningStepTicker();
  if (execInputTargetRid === ev.id) {
    execInputTargetRid = null;
    execInputTargetName = null;
    const remaining = document.querySelector('.ev-block.ev-running[data-rid]');
    if (remaining) {
      execInputTargetRid = remaining.dataset.rid;
      execInputTargetName = (byId[execInputTargetRid] && byId[execInputTargetRid].short_name) || execInputTargetRid;
    }
  }
  updateExecInputTarget();
  refreshExecInputAvailability();
}

function addLogSummary(hasFail, wasStopped) {
  const div = document.createElement('div');
  div.className = 'log-summary ' + (hasFail || wasStopped ? 'fail' : 'ok');
  div.textContent = wasStopped ? '■ EXECUTION STOPPED' : (hasFail ? '✗ EXECUTION FAILED' : '✓ EXECUTION COMPLETE');
  logBody.appendChild(div);
  logBody.scrollTop = logBody.scrollHeight;
}

// ── Apply execution ────────────────────────────────────
async function doApply() {
  if (applyPollTimer) { doApplyStop(); return; }
  applyBtn.textContent = '■ Stop';
  applyBtn.className = 'btn';
  applyBtn.style.background = 'var(--red)'; applyBtn.style.color = '#fff'; applyBtn.style.borderColor = 'var(--red)';
  rerunBtn.disabled = true;

  // Open log pane expanded and clear it
  clearLog();
  showLogPane(true);
  logTitle.textContent = 'Executing...';
  // Default to expanded view so all detail is visible
  logAllExpanded = true;
  document.getElementById('logExpandBtn').innerHTML = '&#8863; Collapse All';
  applyCursor = 0;
  applyStopClicks = 0;
  applyHeartbeatTs = null;
  applyPollErrorTs = null;

  // Show progress bar, reset to 0
  document.getElementById('progressWrap').style.display = '';
  document.getElementById('progressBar').style.width = '0%';

  // Show and switch to exec tab
  document.getElementById('tabExec').style.display = '';
  switchInspTab('exec');
  ensureExecShell();
  document.getElementById('execLog').innerHTML = '<div style="color:var(--text3)">Starting apply...</div>';
  setExecInputVisible(false);

  const r = await apiWithVaultRetry('POST', '/api/apply', { source: codeEl.value });
  if (r.error) {
    logBody.innerHTML = `<div class="log-entry"><div class="log-entry-hdr"><span class="log-icon fail">✗</span><span class="log-name">${esc(r.error)}</span></div></div>`;
    ensureExecShell();
    document.getElementById('execLog').innerHTML = `<div class="ev ev-fail">${esc(r.error)}</div>`;
    setExecInputVisible(false);
    logTitle.textContent = 'Failed';
    resetApplyBtn(); return;
  }
  applyPollTimer = setInterval(pollApplyEvents, 300);
}

async function doApplyStop() {
  if (!applyPollTimer) return;
  applyStopClicks += 1;
  const force = applyStopClicks > 1;
  await api('POST', '/api/apply/stop', { force });
  applyBtn.textContent = force ? '✕ Killing...' : '✕ Kill';
  applyBtn.className = 'btn';
  applyBtn.style.background = force ? 'var(--red)' : 'var(--amber)';
  applyBtn.style.color = '#fff';
  applyBtn.style.borderColor = force ? 'var(--red)' : 'var(--amber)';
}

function resetApplyBtn() {
  clearInterval(applyPollTimer); applyPollTimer = null;
  applyStopClicks = 0;
  applyHeartbeatTs = null;
  applyPollErrorTs = null;
  runningStepMeta.clear();
  stopRunningStepTicker();
  setExecInputVisible(false);
  applyBtn.textContent = '▶ Apply';
  applyBtn.className = 'btn btn-green';
  applyBtn.style.background = ''; applyBtn.style.color = ''; applyBtn.style.borderColor = '';
  rerunBtn.disabled = false;
  document.getElementById('progressWrap').style.display = 'none';
}

async function pollApplyEvents() {
  try {
    const r = await api('GET', '/api/apply/events?since=' + applyCursor);
    if (r.error) throw new Error(r.error);
    if (!r.events) return;
    let stepCount = 0, failCount = 0;
    let skipCount = 0, cancelCount = 0;
    r.events.forEach(ev => {
      if (ev.type === 'apply_heartbeat') {
        applyHeartbeatTs = Date.parse(ev.ts || '') || Date.now();
        applyPollErrorTs = null;
        updateApplyConnectionStatus();
      } else if (ev.type === 'wave') {
        const log = document.getElementById('execLog');
        if (log) {
          const tw = ev.total_waves || '?', dn = ev.done || 0, tot = ev.total || '?';
          log.innerHTML += `<div class="ev-wave">── Wave ${ev.wave}/${tw} (${dn}/${tot} done, ${ev.count} to run) ──</div>`;
        }
        addLogWave(ev.wave, ev.count);
      } else if (ev.type === 'step_start') {
        // Step is starting execution — highlight card as in-progress
        if (document.getElementById('logFollowCb').checked) {
          const cardId = ev.id || ev.name;
          const card = document.querySelector(`.nc[data-id="${CSS.escape(cardId)}"]`);
          if (card) {
            card.classList.add('follow-hl');
            if (document.getElementById('graphPanel').style.display !== 'none') {
              card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          }
        }
        addExecRunningEntry(ev);
        addRunningLogEntry(ev);
      } else if (ev.type === 'step_proc') {
        const meta = runningStepMeta.get(ev.id);
        if (meta) {
          meta.pid = ev.pid || null;
          meta.interactive = !!ev.interactive;
          meta.procAlive = true;
          meta.returnCode = null;
          updateRunningMetaDisplay(ev.id);
          refreshExecInputAvailability();
        }
      } else if (ev.type === 'step_proc_state') {
        const meta = runningStepMeta.get(ev.id);
        if (meta) {
          meta.procAlive = !!ev.alive;
          meta.returnCode = ev.returncode;
          updateRunningMetaDisplay(ev.id);
        }
      } else if (ev.type === 'step_output') {
        appendExecOutput(ev.id, ev.stream, ev.chunk || '');
        appendRunningLogOutput(ev.id, ev.stream, ev.chunk || '');
        if (document.getElementById('logFollowCb').checked) {
          const log = document.getElementById('execLog');
          if (log) log.scrollTop = log.scrollHeight;
        }
      } else if (ev.type === 'step') {
        stepCount++;
        if (ev.status === 'skip' || ev.status === 'skip_check') skipCount++;
        if (ev.status === 'failed' || ev.status === 'timeout') failCount++;
        if (ev.status === 'cancelled') cancelCount++;
        // Update progress bar
        if (ev.idx && ev.total) {
          const pct = Math.round(ev.idx / ev.total * 100);
          document.getElementById('progressBar').style.width = pct + '%';
        }
        finishExecEntry(ev);
        // Log pane (rich detail)
        replaceRunningLogEntry(ev);
        logTitle.textContent = `Executing... [${ev.idx}/${ev.total}]`;
        // Auto-follow: remove highlight from completed card, scroll log
        if (document.getElementById('logFollowCb').checked) {
          const cardId = ev.id || ev.name;
          const card = document.querySelector(`.nc[data-id="${CSS.escape(cardId)}"]`);
          if (card) card.classList.remove('follow-hl');
          logBody.scrollTop = logBody.scrollHeight;
        }
      } else if (ev.type === 'error') {
        const log = document.getElementById('execLog');
        if (log) log.innerHTML += `<div class="ev ev-fail"><span class="ev-icon">✗</span><span class="ev-name">${esc(ev.msg)}</span></div>`;
        const entry = document.createElement('div'); entry.className = 'log-entry';
        entry.innerHTML = `<div class="log-entry-hdr"><span class="log-icon fail">✗</span><span class="log-name">${esc(ev.msg)}</span></div>`;
        logBody.appendChild(entry);
      } else if (ev.type === 'failed') {
        // Separate failed event — already handled by the step event
      } else if (ev.type === 'done') {
        const hasFail = !!logBody.querySelector('.log-icon.fail') || failCount > 0;
        const wasStopped = cancelCount > 0 && failCount === 0;
        const log = document.getElementById('execLog');
        if (log) {
          // Show skip banner at the TOP of the exec log so it's immediately visible
          if (skipCount > 0 && skipCount === stepCount) {
            log.insertAdjacentHTML('afterbegin', `<div class="ev-wave" style="color:var(--yellow);border-color:var(--yellow);margin-bottom:6px">⚠ All ${skipCount} steps skipped — completed previously. Click ⟳ Re-run All to start fresh.</div>`);
          } else if (stepCount > 0 && skipCount > stepCount * 0.8) {
            log.insertAdjacentHTML('afterbegin', `<div class="ev-wave" style="color:var(--yellow);border-color:var(--yellow);margin-bottom:6px">⚠ ${skipCount}/${stepCount} steps skipped from state. Click ⟳ Re-run All to re-execute all.</div>`);
          }
          log.innerHTML += `<div class="ev-done ${(hasFail || wasStopped) ? 'fail' : 'ok'}">${wasStopped ? '■ STOPPED' : (hasFail ? '✗ FAILED' : '✓ COMPLETE')}</div>`;
        }
        addLogSummary(hasFail, wasStopped);
        logTitle.textContent = wasStopped ? 'Execution stopped' : (hasFail ? 'Execution failed' : (skipCount === stepCount && stepCount > 0 ? 'All skipped (state)' : 'Execution complete'));
        // Clear follow highlight
        document.querySelectorAll('.nc.follow-hl').forEach(c => c.classList.remove('follow-hl'));
        resetApplyBtn();
        triggerResolve();
        // Show Report tab if there's collect data
        loadReport().then(() => {
          const rEl = document.getElementById('reportContent');
          if (rEl && !rEl.querySelector('.empty')) {
            document.getElementById('tabReport').style.display = '';
          }
        }).catch(() => {});
      }
    });
    applyCursor = r.cursor;
    const log = document.getElementById('execLog');
    if (log && document.getElementById('logFollowCb').checked) log.scrollTop = log.scrollHeight;
    updateApplyConnectionStatus();
  } catch(e) {
    applyPollErrorTs = Date.now();
    const msg = e && e.message ? e.message : String(e);
    logTitle.textContent = `Executing... (polling lost: ${msg})`;
    setStatus('err', 'Apply polling failed: ' + msg);
    const log = document.getElementById('execLog');
    if (log) log.innerHTML += `<div class="ev ev-fail"><span class="ev-icon">✗</span><span class="ev-name">${esc('Apply polling failed: ' + msg)}</span></div>`;
    resetApplyBtn();
  }
}

async function doApplyFresh() {
  if (applyPollTimer) { doApplyStop(); return; }
  const resp = await api('POST', '/api/state/reset', {});
  if (resp && resp.error) { appendLog('ev-fail', '✗ Failed to reset state: ' + resp.error); return; }
  doApply();
}

async function doRerun(stepName) {
  await api('POST', '/api/state/set', { step: stepName, action: 'redo' });
  doApply();
}

// ── Autocomplete ───────────────────────────────────────
async function loadTemplates() {
  try {
    const r = await api('GET', '/api/templates');
    templates = r.templates || [];
  } catch(e) {}
}

function updateStepNames(src) {
  stepNames = [];
  const re = /\[([^\]]+)\]/g; let m;
  while ((m = re.exec(src)) !== null) stepNames.push(m[1]);
}

function showAutocomplete() {
  const pos = codeEl.selectionStart;
  const before = codeEl.value.substring(0, pos);
  const lineStart = before.lastIndexOf('\n') + 1;
  const line = before.substring(lineStart);

  let items = [];
  // After "first [" or "needs [" — suggest step names
  const stepMatch = line.match(/(?:first|needs)\s+(?:\[([^\]]*,\s*)?)\[?([^\]]*)?$/);
  if (stepMatch) {
    const partial = (stepMatch[2] || '').toLowerCase();
    items = stepNames.filter(s => s.toLowerCase().includes(partial)).slice(0, 8)
      .map(s => ({ text: s, insert: `[${s}]`, icon: '□' }));
  }
  // After "from " — suggest templates
  const fromMatch = line.match(/from\s+([\w/]*)$/);
  if (fromMatch) {
    const partial = fromMatch[1].toLowerCase();
    items = templates.filter(t => t.path.toLowerCase().includes(partial)).slice(0, 8)
      .map(t => ({ text: t.path, insert: t.path, icon: '◇', desc: t.params.map(p => p.name).join(', ') }));
  }

  if (items.length === 0) { hideAc(); return; }
  acIdx = 0;
  renderAc(items);
}

function renderAc(items) {
  // Position popup near cursor
  const rect = codeEl.getBoundingClientRect();
  const pos = codeEl.selectionStart;
  const lines = codeEl.value.substring(0, pos).split('\n');
  const lineH = 21; // approximate
  const top = rect.top + (lines.length * lineH) - codeEl.scrollTop + 4;
  const col = lines[lines.length - 1].length;
  const left = rect.left + 50 + (col * 7.8) - codeEl.scrollLeft;

  acPopup.style.top = Math.min(top, window.innerHeight - 180) + 'px';
  acPopup.style.left = Math.min(left, window.innerWidth - 220) + 'px';
  acPopup.innerHTML = items.map((it, i) =>
    `<div class="ac-item${i === acIdx ? ' sel' : ''}" data-idx="${i}" onmousedown="pickAc(${i})"><span class="ac-icon">${it.icon}</span>${esc(it.text)}${it.desc ? '<span style="margin-left:auto;color:var(--text3);font-size:9px">' + esc(it.desc) + '</span>' : ''}</div>`
  ).join('');
  acPopup._items = items;
  acPopup.classList.add('show');
}

function hideAc() { acPopup.classList.remove('show'); acPopup._items = null; acIdx = -1; }

function pickAc(idx) {
  const items = acPopup._items;
  if (!items || !items[idx]) return;
  const it = items[idx];
  const pos = codeEl.selectionStart;
  const before = codeEl.value.substring(0, pos);
  const after = codeEl.value.substring(pos);
  // Find what to replace: last partial match
  const lineStart = before.lastIndexOf('\n') + 1;
  const line = before.substring(lineStart);
  let replaceFrom = pos;
  if (it.icon === '□') { // step name
    const m = line.match(/\[([^\]]*)$/);
    if (m) replaceFrom = pos - m[1].length - 1;
    codeEl.value = before.substring(0, replaceFrom) + it.insert + after;
    codeEl.selectionStart = codeEl.selectionEnd = replaceFrom + it.insert.length;
  } else { // template path
    const m = line.match(/from\s+([\w/]*)$/);
    if (m) replaceFrom = pos - m[1].length;
    let ins = it.insert + ':\n';
    const item = templates.find(t => t.path === it.text);
    if (item) {
      const indent = line.match(/^(\s*)/)[1] + '  ';
      item.params.forEach(p => { ins += `${indent}${p.name} = "${p.default || ''}"\n`; });
    }
    codeEl.value = before.substring(0, replaceFrom) + ins + after;
    codeEl.selectionStart = codeEl.selectionEnd = replaceFrom + ins.length;
  }
  hideAc();
  codeEl.dispatchEvent(new Event('input'));
}

document.addEventListener('click', e => {
  const fileLink = e.target.closest('.prob-file-link[data-resolved]');
  if (fileLink) {
    e.stopPropagation();
    openSideEditor(
      fileLink.dataset.resolved,
      fileLink.dataset.type,
      fileLink.dataset.path,
      fileLink.dataset.step || undefined
    );
    return;
  }
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  if (action === 'open-side-editor') {
    openSideEditor(
      actionEl.dataset.resolved,
      actionEl.dataset.type,
      actionEl.dataset.path,
      actionEl.dataset.step || undefined
    );
    return;
  }
  if (action === 'select-resource') {
    e.stopPropagation();
    selectResource(actionEl.dataset.rid);
    return;
  }
  if (action === 'scroll-log-resource') {
    e.stopPropagation();
    scrollLogToResource(actionEl.dataset.rid);
    return;
  }
  if (action === 'toggle-log-detail') {
    const detail = actionEl.nextElementSibling;
    if (detail) detail.classList.toggle('open');
    selectResource(actionEl.dataset.rid);
    return;
  }
  if (action === 'rerun-step') {

    doRerun(actionEl.dataset.step);
  }

// Close more-menu on outside click

(async function init() {
  try {
    const info = await api('GET', '/api/info');
    availableGraphFiles = info.files || [];
    availableGraphFileEntries = info.file_entries || availableGraphFiles.map(name => ({ name, is_template: false }));
    filenameEl.title = availableGraphFiles.length ? 'Click to choose file' : 'No graph files available';
    filePickerBtn.classList.toggle('disabled', !availableGraphFiles.length);

    if (info.file) {
      await loadFile(info.file);
    } else {
      setStatus('info', 'No file loaded');

// ═════════════════════════════════════════════════════════════════════════
// Demo Runner — simulates graph execution wave by wave
// ═════════════════════════════════════════════════════════════════════════

class DemoRunner {
  constructor() {
    this.speed = 1.0;
    this.state = 'idle';
    this.completed = new Set();
    this.failed = new Set();
    this.failTarget = null;
    this.failRecovered = false;
    this.timeouts = [];
    this.waveProg = {};
    this.origBadges = new Map();
    this.origClasses = new Map();
  }

  get waves() { return graphData && graphData.graph ? graphData.graph.waves : []; }

  setSpeed(s) { this.speed = s; }
  _t(ms) { return Math.round(ms / this.speed); }
  _delay(fn, ms) { const id = setTimeout(fn, this._t(ms)); this.timeouts.push(id); return id; }

  pickFailTarget() {
    const waves = this.waves;
    const minWave = Math.max(0, Math.floor(waves.length * 0.6));
    const candidates = [];
    for (let wi = minWave; wi < waves.length; wi++) {
      for (const rid of waves[wi]) {
        const r = byId[rid];
        if (r && !r.is_verify && !r.is_barrier && r.needs.length > 0) candidates.push(rid);
      }
    }
    if (candidates.length) this.failTarget = candidates[Math.floor(Math.random() * candidates.length)];
  }

  getCard(rid) { return document.getElementById('c-' + rid.replace(/[^a-zA-Z0-9]/g, '_')); }

  setBadge(card, cls, text) {
    let badge = card.querySelector('.stb');
    if (!badge) { badge = document.createElement('span'); badge.className = 'stb'; card.appendChild(badge); }
    badge.className = 'stb ' + cls; badge.textContent = text;
  }

  removeBadge(card) { const b = card.querySelector('.stb'); if (b) b.remove(); }

  clearDemoClasses(card) {
    card.classList.remove('demo-checking', 'demo-running', 'demo-failed-shake',
      'demo-resuming', 'st-success', 'st-skip_check', 'st-failed', 'st-warned');
  }

  showToast(text, cls, duration) {
    const area = document.getElementById('toast-area');
    if (!area) return;
    const t = document.createElement('div'); t.className = 'toast ' + (cls || ''); t.textContent = text;
    area.appendChild(t);
    this._delay(() => { if (t.parentNode) t.remove(); }, duration || 3000);
  }

  _initLog() {
    document.getElementById('tabExec').style.display = '';
    switchInspTab('exec');
    execEl.innerHTML = '<div class="exec-log" id="execLog"><div style="color:var(--text3)">Demo starting...</div></div>';
  }

  _log(html) {
    const log = document.getElementById('execLog');
    if (log) { log.innerHTML += html; log.scrollTop = log.scrollHeight; }
  }

  initWaveProgress() {
    document.querySelectorAll('.wl').forEach((wl, wi) => {
      let pg = wl.querySelector('.wprog');
      if (!pg) { pg = document.createElement('span'); pg.className = 'wprog'; wl.appendChild(pg); }
      const total = this.waves[wi] ? this.waves[wi].length : 0;
      pg.innerHTML = '<span class="wprog-bar"><span class="wprog-fill" style="width:0%"></span></span>0/' + total;
      this.waveProg[wi] = { el: pg, done: 0, total: total };
    });
  }

  updateWaveProgress(wi) {
    const wp = this.waveProg[wi]; if (!wp) return;
    wp.done++;
    const pct = Math.round((wp.done / wp.total) * 100);
    wp.el.innerHTML = '<span class="wprog-bar"><span class="wprog-fill" style="width:' + pct + '%"></span></span>' + wp.done + '/' + wp.total;
  }

  saveCardState() {
    document.querySelectorAll('.nc').forEach(card => {
      this.origClasses.set(card.dataset.id, card.className);
      const badge = card.querySelector('.stb');
      this.origBadges.set(card.dataset.id, badge ? badge.outerHTML : null);
    });
  }

  restoreCardState() {
    document.querySelectorAll('.nc').forEach(card => {
      const rid = card.dataset.id;
      if (this.origClasses.has(rid)) card.className = this.origClasses.get(rid);
      const existingBadge = card.querySelector('.stb');
      if (existingBadge) existingBadge.remove();
      const origHTML = this.origBadges.get(rid);
      if (origHTML) card.insertAdjacentHTML('afterbegin', origHTML);
    });
    document.querySelectorAll('.wprog').forEach(p => p.remove());
    const ta = document.getElementById('toast-area'); if (ta) ta.innerHTML = '';
  }

  start() {
    if (!graphData || !graphData.graph || !this.waves.length) {
      this.showToast('No graph loaded — validate first', 'toast-fail', 2000); return;
    }
    this.saveCardState();
    document.querySelectorAll('.nc').forEach(card => { this.clearDemoClasses(card); this.removeBadge(card); });
    this.completed.clear(); this.failed.clear(); this.failRecovered = false;
    this.waveProg = {};
    this.pickFailTarget();
    this.initWaveProgress();
    this._initLog();
    this.state = 'running'; this._updateButton();
    this.showToast('Starting execution...', '', 2000);
    this._delay(() => this.runWave(0), 600);
  }

  pause() { this.state = 'paused'; this.timeouts.forEach(clearTimeout); this.timeouts = []; this._updateButton(); }

  reset() {
    this.state = 'idle'; this.timeouts.forEach(clearTimeout); this.timeouts = [];
    this.completed.clear(); this.failed.clear();
    this.restoreCardState(); this._updateButton();
  }

  _updateButton() {
    const btn = document.getElementById('bdemo'); if (!btn) return;
    btn.classList.remove('demo-active', 'demo-done');
    if (this.state === 'running') { btn.innerHTML = '\u23F8 Pause'; btn.classList.add('demo-active'); }
    else if (this.state === 'paused') { btn.innerHTML = '\u25B6 Resume'; }
    else if (this.state === 'done') { btn.innerHTML = '\u21BA Reset'; btn.classList.add('demo-done'); }
    else { btn.innerHTML = '\u25B6 Demo'; }
  }

  runWave(wi) {
    if (this.state !== 'running' || wi >= this.waves.length) {
      if (this.state === 'running') {
        this.state = 'done'; this._updateButton();
        this._log('<div class="ev-done ok">✓ COMPLETE</div>');
        this.showToast('All steps completed successfully', 'toast-done', 4000);
      }
      return;
    }
    const wave = this.waves[wi];
    let waveCompleted = 0; const total = wave.length;
    this._log(`<div class="ev-wave">── Wave ${wi + 1} (${total}) ──</div>`);

    wave.forEach((rid, i) => {
      const stagger = i * (120 + Math.random() * 180);
      this._delay(() => {
        if (this.state !== 'running') return;
        this.simulateResource(rid, wi, () => {
          waveCompleted++; this.updateWaveProgress(wi);
          if (waveCompleted >= total) this._delay(() => this.runWave(wi + 1), 400);
        });
      }, stagger);
    });
  }

  simulateResource(rid, wi, onDone) {
    const card = this.getCard(rid); const res = byId[rid];
    if (!card || !res) { onDone(); return; }
    selectResource(rid);

    const hasCheck = res.check && res.check !== 'false';
    const isFail = rid === this.failTarget && !this.failRecovered;

    if (hasCheck && !isFail) {
      this.clearDemoClasses(card); card.classList.add('demo-checking');
      this.setBadge(card, 'stb-checking', 'checking...');
      this._delay(() => {
        this.clearDemoClasses(card); card.classList.add('st-skip_check');
        this.setBadge(card, 'stb-skip', 'skip'); this.completed.add(rid);
        this._log(`<div class="ev ev-skip"><span class="ev-icon">↷</span><span class="ev-name">[${res.short_name}]</span><span class="ev-time">skip</span></div>`);
        onDone();
      }, 200 + Math.random() * 300);
      return;
    }

    this.clearDemoClasses(card); card.classList.add('demo-checking');
    this.setBadge(card, 'stb-checking', 'checking...');

    this._delay(() => {
      this.clearDemoClasses(card); card.classList.add('demo-running');
      this.setBadge(card, 'stb-running', 'running...');
      const runTime = res.is_verify ? (800 + Math.random() * 700) : (500 + Math.random() * 1500);

      this._delay(() => {
        if (isFail) {
          this.clearDemoClasses(card); card.classList.add('st-failed', 'demo-failed-shake');
          this.setBadge(card, 'stb-failed', 'FAIL'); this.failed.add(rid);
          this._log(`<div class="ev ev-fail"><span class="ev-icon">✗</span><span class="ev-name">[${res.short_name}] failed (exit=1)</span></div>`);
          this.showToast('\u2717 ' + res.short_name + ' failed (exit=1)', 'toast-fail', 5000);
          this._delay(() => {
            this.showToast('Resuming from [' + res.short_name + ']...', 'toast-resume', 3000);
            this._delay(() => {
              this.clearDemoClasses(card); card.classList.add('demo-resuming');
              this.setBadge(card, 'stb-resuming', 'retrying...');
              this._delay(() => {
                this.clearDemoClasses(card); card.classList.add('st-success');
                const ms = Math.round(400 + Math.random() * 800);
                this.setBadge(card, 'stb-success', ms + 'ms');
                this._log(`<div class="ev ev-ok"><span class="ev-icon">✓</span><span class="ev-name">[${res.short_name}] (retry)</span><span class="ev-time">${ms}ms</span></div>`);
                this.failed.delete(rid); this.completed.add(rid); this.failRecovered = true;
                this.showToast('\u2713 ' + res.short_name + ' succeeded on retry', 'toast-done', 3000);
                onDone();
              }, 800 + Math.random() * 600);
            }, 800);
          }, 1800);
          return;
        }
        this.clearDemoClasses(card); card.classList.add('st-success');
        const successMs = Math.round(runTime);
        this.setBadge(card, 'stb-success', successMs + 'ms');
        this._log(`<div class="ev ev-ok"><span class="ev-icon">✓</span><span class="ev-name">[${res.short_name}]</span><span class="ev-time">${successMs}ms</span></div>`);
        this.completed.add(rid); onDone();
      }, runTime);
    }, 200 + Math.random() * 200);
  }
}

const demo = new DemoRunner();

function demoToggle() {
  if (demo.state === 'idle') demo.start();
  else if (demo.state === 'running') demo.pause();
  else if (demo.state === 'paused') { demo.reset(); demo.start(); }
  else if (demo.state === 'done') demo.reset();
}

function demoSpeed(val) { demo.setSpeed(parseFloat(val)); }

// ── Theme toggle ───────────────────────────────────────
function getTheme() {
  const saved = localStorage.getItem('cgr-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.classList.toggle('light', theme === 'light');
  document.documentElement.classList.toggle('dark', theme === 'dark');
  document.getElementById('themeBtn').textContent = theme === 'light' ? '\u263E' : '\u2600';
}

function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('cgr-theme', next);
  applyTheme(next);
}

applyTheme(getTheme());
